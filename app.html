(function() {

      addSection:'إضافة قسم جديد', deleteSection:'حذف القسم',

    },

      technicalSkills:'Technical Skills', tacticalIntel:'Tactical Intelligence',
      physical:'Physical', technical:'Technical', tactical:'Tactical',
      pace:'Pace', stamina:'Stamina', strength:'Strength', dribbling:'Dribbling',
      passing:'Passing', shooting:'Shooting', positioning2:'Positioning', vision:'Vision',
      strengths:'Strengths', weaknesses:'Weaknesses', heatmap:'Heat Map',
      levelChart:'Level Trend', physicalTests:'Physical Tests',
      save:'Save', name:'Name', age:'Age', position:'Position',
      heartRate:'Heart Rate', vo2max:'VO₂ Max', recovery:'Recovery',
      injuryRisk:'Injury Risk', deleteConfirm:'Are you sure you want to delete this player?',
      hideSection:'Hide', showSection:'Show', noPlayers:'No players',
      addDot:'Add Player', addArrow:'Arrow', clear:'Clear', move:'Move',
      sprint30m:'30m Sprint', agility:'Agility', endurance:'Endurance', jump:'Vertical Jump',
      tabOverview:'Profile', tabSkills:'Skills', tabPitch:'Pitch', tabTrend:'Level', tabEdit:'Edit',
      appTitle:'📋 Player Profile', playerNamePlaceholder:'Player name',
      addSection:'Add New Section', deleteSection:'Delete Section',
      sectionName:'Section Name', sectionContent:'Section Content'
    }
  };
  function t(k) { return i18n[currentLang]?.[k] || k; }

  function defaultPlayers() {
    return [{
      id:'w1', name:'لاعب الجناح', nameEn:'Winger Player', age:24,
      position:'جناح أيمن', positionEn:'Right Winger',
      pace:92, stamina:85, strength:68, dribbling:90, passing:82, shooting:84,
      posSkill:88, vision:86,
      strengths:'السرعة، المراوغة، العرضيات', weaknesses:'ضربات الرأس',
      heatmap:[0.1,0.3,0.9,0.6,0.2, 0.2,0.5,0.8,0.7,0.3, 0.1,0.4,0.7,0.5,0.2],
      photo:'', positionX:78, positionY:35,
      heartRate:65, vo2max:60, recovery:88, injuryRisk:10,
      sprintTime:3.1, agilityTest:4.2, enduranceTest:92, jumpHeight:55,
      levelHistory:[72,75,78,80,83,86,89,90,92],
      coreRole:'مصدر الخطورة على الأطراف\nصانع الفرص\nمهاجم إضافي\nأول مدافع من الأمام',
      defensiveDuties:'الضغط على الظهر المنافس\nالعودة لتغطية الظهر\nإغلاق المساحات على الطرف\nالمشاركة في الضغط العالي',
      positioning:'عند امتلاك الكرة:\n• الالتزام بالخطوط لفتح الملعب\n• التحرك بين الظهير وقلب الدفاع\n• الدخول للعمق (HALF SPACE)\n• التحرك خلف خط الدفاع\n• تبادل المراكز مع المهاجم وصانع اللعب',
      transitions:'• التحرك خلف خط الدفاع\n• التحرك بين الخطوط\n• تبادل المراكز مع المهاجم وصانع اللعب\n• تحرك بدون كرة',
      technicalSkills:'السرعة والانطلاق\nالرشاقة والتوازن\nالتحمل العالي\nالتسارع',
      tacticalIntel:'قراءة تحركات الظهر\nمعرفة متى تدخل للعمق\nاختيار القرار الصحيح\n(تمرير / تسديد / مراوغة)\nالتوقيت المثالي للجري'
    }];
  }

  function loadPlayers() {
    try { const stored = localStorage.getItem(STORAGE_KEY); players = stored ? JSON.parse(stored) : defaultPlayers(); } catch(e) { players = defaultPlayers(); }
    try { hiddenSections = JSON.parse(localStorage.getItem('hidden_sec_v9') || '{}'); } catch(e) { hiddenSections = {}; }
    try { customSections = JSON.parse(localStorage.getItem(SECTIONS_STORAGE_KEY) || '[]'); } catch(e) { customSections = []; }
    try { const sp = localStorage.getItem(PITCH_STORAGE_KEY); if(sp) pitchState = JSON.parse(sp); } catch(e) { pitchState = { dots: [], arrows: [], tool: 'move' }; }
  }
  function savePlayers() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(players)); } catch(e) {} }
  function saveHidden() { try { localStorage.setItem('hidden_sec_v9', JSON.stringify(hiddenSections)); } catch(e) {} }
  function saveCustomSections() { try { localStorage.setItem(SECTIONS_STORAGE_KEY, JSON.stringify(customSections)); } catch(e) {} }
  function savePitchState() { try { localStorage.setItem(PITCH_STORAGE_KEY, JSON.stringify(pitchState)); } catch(e) {} }
  function getPlayer(id) { return players.find(p => p.id === id); }

  function populateSelect() {
    const sel = document.getElementById('playerSelect');
    if(!sel) return;
    sel.innerHTML = '';
    players.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = currentLang==='ar' ? p.name : (p.nameEn||p.name);
      sel.appendChild(opt);
    });
    if(players.length>0 && !currentPlayerId) { currentPlayerId=players[0].id; sel.value=currentPlayerId; }
    if(!players.length) currentPlayerId=null;
  }

  function isHidden(s) { return hiddenSections[currentPlayerId+'_'+s]||false; }
  window.toggleSection = function(s) {
    hiddenSections[currentPlayerId+'_'+s] = !isHidden(s);
    saveHidden();
    renderTab(document.querySelector('.tab.active')?.dataset.tab||'overview');
  };
  window.deleteSection = function(s) {
    if(!confirm(t('deleteConfirm'))) return;
    customSections = customSections.filter(sec => sec.id !== s);
    saveCustomSections();
    renderTab(document.querySelector('.tab.active')?.dataset.tab||'overview');
  };

  function sectionCard(titleKey, icon, content, secId, isCustom=false) {
    const hidden = isHidden(secId);
    const title = typeof titleKey === 'string' ? t(titleKey) : titleKey;
    const deleteBtn = isCustom ? `<button class="section-delete" onclick="event.stopPropagation();window.deleteSection('${secId}')"><i class="fas fa-trash"></i></button>` : '';
    return `
      <div class="card" id="section-${secId}">
        <div class="section-header" onclick="window.toggleSection('${secId}')">
          <h3><i class="fas ${icon}" style="color:var(--accent);"></i> ${title}</h3>
          <div class="section-actions">
            ${deleteBtn}
            <button class="section-toggle"><i class="fas fa-${hidden?'plus':'minus'}"></i></button>
          </div>
        </div>
        <div class="section-body ${hidden?'hidden':''}" id="body-${secId}">${content}</div>
      </div>`;
  }

  function addCustomSectionForm() {
    const name = prompt(t('sectionName'));
    if(!name) return;
    const content = prompt(t('sectionContent'));
    if(content===null) return;
    const id = 'custom_' + Date.now();
    customSections.push({id, name, content});
    saveCustomSections();
    renderTab(document.querySelector('.tab.active')?.dataset.tab||'overview');
  }

  function renderTab(tabId) {
    if(!currentPlayerId) {
      document.getElementById('profileContent').innerHTML = `<p style="text-align:center;padding:40px;">${t('noPlayers')}</p>`;
      return;
    }
    const p = getPlayer(currentPlayerId);
    if(!p) return;
    const c = document.getElementById('profileContent');
    const name = currentLang==='ar'?p.name:(p.nameEn||p.name);
    const pos = currentLang==='ar'?p.position:(p.positionEn||p.position);

    if(tabId==='overview') {
      let customHTML = customSections.map(sec => {
        return sectionCard(sec.name, 'fa-star', sec.content, sec.id, true);
      }).join('');

      c.innerHTML = `
        <div class="img-section">

  function initPitch(p) {
    const canvas = document.getElementById('pitchCanvas');
    if(!canvas) return;
    const wrap = canvas.parentElement;
    canvas.width = wrap.clientWidth * 2;
    canvas.height = wrap.clientHeight * 2;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const pw = w * 0.08, ph = h * 0.06;
    let dragIndex = -1, offsetX = 0, offsetY = 0;

    function drawPitch() {
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,w,h);
      for(let i=0;i<14;i++) { ctx.fillStyle = i%2===0?'#f8fafc':'#f1f5f9'; ctx.fillRect(0,i*h/14,w,h/14); }
      ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 3;
      ctx.strokeRect(pw, ph, w-pw*2, h-ph*2);
      ctx.beginPath(); ctx.moveTo(w/2, ph); ctx.lineTo(w/2, h-ph); ctx.stroke();
      ctx.beginPath(); ctx.arc(w/2, h/2, w*0.08, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(w/2, h/2, 4, 0, Math.PI*2); ctx.fillStyle='#64748b'; ctx.fill();
      ctx.fillStyle='#64748b'; ctx.fillRect(w/2-1.5, ph, 3, h*0.03); ctx.fillRect(w/2-1.5, h-ph-h*0.03, 3, h*0.03);
      const bx = w*0.2, by = ph, bw = w*0.6, bh = h*0.16;
      ctx.strokeRect(bx, by, bw, bh); ctx.strokeRect(bx, h-ph-bh, bw, bh);
      const gx = w*0.32, gy = ph, gw = w*0.36, gh = h*0.06;
      ctx.strokeRect(gx, gy, gw, gh); ctx.strokeRect(gx, h-ph-gh, gw, gh);
      ctx.beginPath(); ctx.arc(w/2, ph+bh/2, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(w/2, h-ph-bh/2, 3, 0, Math.PI*2); ctx.fill();
      const cr = w*0.02;
      ctx.beginPath(); ctx.arc(pw, ph, cr, 0, Math.PI/2); ctx.stroke();
      ctx.beginPath(); ctx.arc(w-pw, ph, cr, Math.PI/2, Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.arc(pw, h-ph, cr, Math.PI*1.5, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(w-pw, h-ph, cr, Math.PI, Math.PI*1.5); ctx.stroke();
    }

    function drawHalfShirt(x, y, r, color, name) {
      ctx.save();
      ctx.fillStyle = color; ctx.beginPath();
      ctx.moveTo(x-r*0.4, y-r*0.5); ctx.lineTo(x+r*0.4, y-r*0.5);
      ctx.lineTo(x+r*0.5, y+r*0.3); ctx.lineTo(x+r*0.15, y+r*0.6);
      ctx.lineTo(x-r*0.15, y+r*0.6); ctx.lineTo(x-r*0.5, y+r*0.3);
      ctx.closePath(); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#fcd9b6'; ctx.beginPath(); ctx.arc(x, y-r*0.65, r*0.35, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font=`bold ${r*0.4}px Cairo`; ctx.textAlign='center';
      ctx.fillText('10', x, y+r*0.1);
      ctx.fillStyle='#1e293b'; ctx.font=`bold ${r*0.3}px Cairo`;
      const tw = ctx.measureText(name).width + 10;
      ctx.fillRect(x-tw/2, y+r*0.7, tw, r*0.4);
      ctx.fillStyle='#fff'; ctx.fillText(name, x, y+r*1.0);
      ctx.restore();
    }

    function drawArrows() {
      pitchState.arrows.forEach(a => {
        const x1=a.x1*w, y1=a.y1*h, x2=a.x2*w, y2=a.y2*h;
        ctx.strokeStyle='#ef4444'; ctx.lineWidth=3; ctx.setLineDash([8,4]);
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        ctx.setLineDash([]); const ang=Math.atan2(y2-y1, x2-x1);
        ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.moveTo(x2,y2);
        ctx.lineTo(x2-12*Math.cos(ang-0.5), y2-12*Math.sin(ang-0.5));
        ctx.lineTo(x2-12*Math.cos(ang+0.5), y2-12*Math.sin(ang+0.5));
        ctx.closePath(); ctx.fill();
      });
    }

    function redraw() { drawPitch(); drawArrows(); pitchState.dots.forEach((d,i) => { const x=d.x*w, y=d.y*h, color=i===0?'#f59e0b':d.color||'#3b82f6'; drawHalfShirt(x,y,w*0.04,color,d.name||''); }); }

    if(pitchState.dots.length===0 && p) { pitchState.dots.push({x:(p.positionX||78)/100, y:(p.positionY||35)/100, name:currentLang==='ar'?p.name:(p.nameEn||p.name), color:'#f59e0b'}); }

    function getPos(e) { const rect=canvas.getBoundingClientRect(); const cx=e.touches?e.touches[0].clientX:e.clientX; const cy=e.touches?e.touches[0].clientY:e.clientY; return {x:(cx-rect.left)/rect.width, y:(cy-rect.top)/rect.height}; }

    canvas.onmousedown = e => {
      const pos=getPos(e);
      if(pitchState.tool==='move') { for(let i=pitchState.dots.length-1;i>=0;i--) { if(Math.hypot(pos.x-pitchState.dots[i].x, pos.y-pitchState.dots[i].y)<0.03) { dragIndex=i; offsetX=pitchState.dots[i].x-pos.x; offsetY=pitchState.dots[i].y-pos.y; break; } } }
      else if(pitchState.tool==='dot') { const nm=document.getElementById('newPlayerNameInput')?.value?.trim()||`لاعب ${pitchState.dots.length+1}`; const colors=['#3b82f6','#10b981','#f97316','#8b5cf6','#ef4444','#f59e0b']; pitchState.dots.push({x:pos.x, y:pos.y, name:nm, color:colors[pitchState.dots.length%colors.length]}); savePitchState(); redraw(); }
      else if(pitchState.tool==='arrow') { pitchState.arrowStart=pos; }
    };
    canvas.onmousemove = e => { if(dragIndex>=0) { const pos=getPos(e); pitchState.dots[dragIndex].x=Math.min(0.96,Math.max(0.04,pos.x+offsetX)); pitchState.dots[dragIndex].y=Math.min(0.94,Math.max(0.06,pos.y+offsetY)); if(dragIndex===0&&p){p.positionX=Math.round(pitchState.dots[0].x*100);p.positionY=Math.round(pitchState.dots[0].y*100);} redraw(); } };
    canvas.onmouseup = e => {
      if(dragIndex>=0) { if(dragIndex===0&&p) savePlayers(); savePitchState(); }
      if(pitchState.tool==='arrow'&&pitchState.arrowStart) { const pos=getPos(e); if(Math.hypot(pos.x-pitchState.arrowStart.x, pos.y-pitchState.arrowStart.y)>0.015) { pitchState.arrows.push({x1:pitchState.arrowStart.x, y1:pitchState.arrowStart.y, x2:pos.x, y2:pos.y, color:'#ef4444'}); savePitchState(); redraw(); } pitchState.arrowStart=null; }
      dragIndex=-1;
    };
    canvas.ontouchstart = e => { e.preventDefault(); const pos=getPos(e); if(pitchState.tool==='move') { for(let i=pitchState.dots.length-1;i>=0;i--) { if(Math.hypot(pos.x-pitchState.dots[i].x, pos.y-pitchState.dots[i].y)<0.03) { dragIndex=i; offsetX=pitchState.dots[i].x-pos.x; offsetY=pitchState.dots[i].y-pos.y; break; } } } else if(pitchState.tool==='dot') { const nm=document.getElementById('newPlayerNameInput')?.value?.trim()||`لاعب ${pitchState.dots.length+1}`; const colors=['#3b82f6','#10b981','#f97316','#8b5cf6','#ef4444','#f59e0b']; pitchState.dots.push({x:pos.x, y:pos.y, name:nm, color:colors[pitchState.dots.length%colors.length]}); savePitchState(); redraw(); } else if(pitchState.tool==='arrow') { pitchState.arrowStart=pos; } };
    canvas.ontouchmove = e => { e.preventDefault(); if(dragIndex>=0) { const pos=getPos(e); pitchState.dots[dragIndex].x=Math.min(0.96,Math.max(0.04,pos.x+offsetX)); pitchState.dots[dragIndex].y=Math.min(0.94,Math.max(0.06,pos.y+offsetY)); if(dragIndex===0&&p){p.positionX=Math.round(pitchState.dots[0].x*100);p.positionY=Math.round(pitchState.dots[0].y*100);} redraw(); } };
    canvas.ontouchend = () => { if(dragIndex>=0&&dragIndex===0&&p) savePlayers(); if(dragIndex>=0) savePitchState(); dragIndex=-1; pitchState.arrowStart=null; };
    redraw();
  }

  window.setTool = function(tool) { pitchState.tool=tool; ['toolMove','toolDot','toolArrow'].forEach(id=>document.getElementById(id)?.classList.remove('active')); const m={move:'toolMove',dot:'toolDot',arrow:'toolArrow'}; document.getElementById(m[tool])?.classList.add('active'); savePitchState(); };
  window.clearPitch = function() { pitchState.dots=pitchState.dots.slice(0,1); pitchState.arrows=[]; const p=getPlayer(currentPlayerId); if(p&&pitchState.dots[0]){pitchState.dots[0]={x:(p.positionX||78)/100,y:(p.positionY||35)/100,name:currentLang==='ar'?p.name:(p.nameEn||p.name),color:'#f59e0b'};} savePitchState(); const canvas=document.getElementById('pitchCanvas'); if(canvas){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);initPitch(p);} };
  window.addCustomSectionForm = addCustomSectionForm;

  function drawTrendChart(p) {
    const canvas=document.getElementById('trendChart'); if(!canvas) return;
    canvas.width=canvas.parentElement.clientWidth; canvas.height=200; const ctx=canvas.getContext('2d');
    const data=p.levelHistory||[70,72,75,78,80,83,86,88,90];
    const w=canvas.width, h=canvas.height, pad=20, maxV=99, minV=40;
    ctx.clearRect(0,0,w,h); ctx.beginPath(); ctx.strokeStyle='#3b82f6'; ctx.lineWidth=3;
    data.forEach((v,i)=>{ const x=pad+(i/(data.length-1))*(w-pad*2); const y=h-pad-((v-minV)/(maxV-minV))*(h-pad*2); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke();
    data.forEach((v,i)=>{ const x=pad+(i/(data.length-1))*(w-pad*2); const y=h-pad-((v-minV)/(maxV-minV))*(h-pad*2); ctx.fillStyle='#3b82f6'; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#1e293b'; ctx.font='bold 11px Cairo'; ctx.textAlign='center'; ctx.fillText(v,x,y-14); });
  }

  function drawRadarChart(p) {
    const canvas=document.getElementById('radarChart'); if(!canvas) return;
    canvas.width=canvas.parentElement.clientWidth; canvas.height=220; const ctx=canvas.getContext('2d');
    const w=canvas.width, h=canvas.height, cx=w/2, cy=h/2, r=Math.min(w,h)/2-20;
    const labels=[t('pace'),t('stamina'),t('strength'),t('dribbling'),t('passing'),t('shooting'),t('positioning2'),t('vision')];
    const vals=[p.pace||50,p.stamina||50,p.strength||50,p.dribbling||50,p.passing||50,p.shooting||50,p.posSkill||50,p.vision||50];
    const n=labels.length; ctx.clearRect(0,0,w,h);
    for(let j=5;j>=1;j--) { ctx.beginPath(); for(let i=0;i<n;i++){ const ang=(Math.PI*2/n)*i-Math.PI/2, rr=r*(j/5); const x=cx+rr*Math.cos(ang), y=cy+rr*Math.sin(ang); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.closePath(); ctx.strokeStyle='#e2e8f0'; ctx.stroke(); }
    ctx.beginPath(); vals.forEach((v,i)=>{ const ang=(Math.PI*2/n)*i-Math.PI/2, rr=r*(v/99); const x=cx+rr*Math.cos(ang), y=cy+rr*Math.sin(ang); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }); ctx.closePath(); ctx.fillStyle='rgba(59,130,246,0.2)'; ctx.fill(); ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2; ctx.stroke();
    labels.forEach((l,i)=>{ const ang=(Math.PI*2/n)*i-Math.PI/2, x=cx+(r+15)*Math.cos(ang), y=cy+(r+15)*Math.sin(ang); ctx.fillStyle='#1e293b'; ctx.font='10px Cairo'; ctx.textAlign='center'; ctx.fillText(l,x,y); });
  }

  function saveEdit() {
    const p=getPlayer(currentPlayerId); if(!p) return;
    p.name=document.getElementById('eNameAr')?.value||p.name||''; p.nameEn=document.getElementById('eNameEn')?.value||p.nameEn||'';

  window.uploadPhoto = function(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(ev) {
      const img=new Image(); img.src=ev.target.result;
      img.onload=function() {
        const canvas=document.createElement('canvas'); const size=Math.min(img.width, img.height);
        canvas.width=200; canvas.height=200; const ctx=canvas.getContext('2d');
        ctx.beginPath(); ctx.arc(100,100,98,0,Math.PI*2); ctx.clip();
        ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,200,200);
        const p=getPlayer(currentPlayerId); if(p){p.photo=canvas.toDataURL(); savePlayers();}
        renderTab('overview');
      };
    };
    reader.readAsDataURL(file);
  };

  function deletePlayer() {
    if(!currentPlayerId) return;

  function switchLang() {
    currentLang=currentLang==='ar'?'en':'ar';
    document.getElementById('langText').textContent=currentLang==='ar'?'English':'العربية';
    document.getElementById('mainTitle').textContent=t('appTitle');
    document.querySelectorAll('.tab').forEach(tab=>{ const k=tab.dataset.tab; const titles={overview:'tabOverview',skills:'tabSkills',pitch:'tabPitch',trend:'tabTrend',edit:'tabEdit'}; const icons={overview:'fa-id-card',skills:'fa-chart-pie',pitch:'fa-futbol',trend:'fa-chart-line',edit:'fa-edit'}; if(titles[k]) tab.innerHTML=`<i class="fas ${icons[k]}"></i> <span>${t(titles[k])}</span>`; });
    if(pitchState.dots.length>0&&currentPlayerId){const p=getPlayer(currentPlayerId);if(p)pitchState.dots[0].name=currentLang==='ar'?p.name:(p.nameEn||p.name);savePitchState();}
    populateSelect(); renderTab(document.querySelector('.tab.active')?.dataset.tab||'overview');
  }

  window.addEventListener('load',()=>{
    loadPlayers(); populateSelect();
    if(players.length>0){currentPlayerId=players[0].id;document.getElementById('playerSelect').value=currentPlayerId;}
    renderTab('overview');
    document.getElementById('playerSelect').addEventListener('change',e=>{currentPlayerId=e.target.value;const p=getPlayer(currentPlayerId);if(p&&pitchState.dots.length>0){pitchState.dots[0]={x:(p.positionX||78)/100,y:(p.positionY||35)/100,name:currentLang==='ar'?p.name:(p.nameEn||p.name),color:'#f59e0b'};savePitchState();}renderTab(document.querySelector('.tab.active')?.dataset.tab||'overview');});
    document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');renderTab(this.dataset.tab);});});
    document.getElementById('langToggle').addEventListener('click',switchLang);
    document.getElementById('addPlayerBtn').addEventListener('click',addPlayer);
    document.getElementById('deletePlayerBtn').addEventListener('click',deletePlayer);
  });
})();
